name: envtest

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  envtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Setup envtest binaries
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
          setup-envtest use 1.29.0 -p path > envtest-path.txt
          echo "KUBEBUILDER_ASSETS=$(cat envtest-path.txt)" >> "$GITHUB_ENV"

      - name: Run envtest suite
        run: go test -v -timeout 30m ./internal/controller/...
