name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.RELEASE_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to ECR
        id: ecr
        run: |
          aws ecr get-login-password --region us-east-1 \
            | docker login --username AWS --password-stdin "${{ secrets.ECR_REGISTRY }}"

      - name: Build & push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.ECR_REGISTRY }}/platform/tenant-rbac-controller:${{ github.ref_name }}
            ${{ secrets.ECR_REGISTRY }}/platform/tenant-rbac-controller:latest

      - name: GoReleaser (binary attestation)
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package & push Helm chart
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm package helm-chart/tenant-rbac-controller --version "${GITHUB_REF_NAME#v}"
          helm push tenant-rbac-controller-*.tgz "oci://${{ secrets.ECR_REGISTRY }}/platform"
