apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../crd/bases
  - ../rbac/service_account.yaml
  - ../rbac/role.yaml
  - ../rbac/role_binding.yaml
  - ../manager/manager.yaml
  # Webhook + cert-manager overlays. Comment these two lines out for the
  # `make run` developer flow if cert-manager isn't installed locally;
  # the webhook is required in cluster deployments.
  - ../webhook
  - ../certmanager
